name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      # go.mod points at the sibling proto and db-adapters modules with
      # replace directives until they are published, so the family is checked
      # out side by side — same layout as a local clone.
      - uses: actions/checkout@v4
        with:
          path: priompt
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/proto
          path: proto
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/db-adapters
          path: db-adapters
      - uses: actions/setup-go@v5
        with:
          go-version-file: priompt/go.mod
      - run: go test ./...
        working-directory: priompt
