# Publishes on a v* tag only — merging this file uploads nothing.
# Before the first real release: set the final image name (see TODO below).
name: release

on:
  push:
    tags: ["v*"]

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write            # push to GHCR
    steps:
      # The Dockerfile builds from the parent context (go.mod replace
      # directives point at the sibling proto and db-adapters modules until
      # they are published), so check the family out side by side.
      - uses: actions/checkout@v4
        with:
          path: priompt
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/proto
          path: proto
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/db-adapters
          path: db-adapters
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: priompt/Dockerfile
          push: true
          # TODO: pick the final image name.
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
